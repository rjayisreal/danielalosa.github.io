<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Birthday Letter 💌</title>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    height: 100vh;
    width: 100vw;
    background: linear-gradient(135deg, #ff416c, #ff4b2b);
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial;
    overflow: hidden;
}

/* PASSWORD SCREEN */
.password-screen {
    position: absolute;
    text-align: center;
    color: white;
    width: 100%;
    padding: 20px;
}

.password-screen input {
    padding: 12px;
    width: 70%;
    max-width: 250px;
    border: none;
    border-radius: 8px;
    margin-top: 10px;
    text-align: center;
    font-size: 16px;
}

.password-screen button {
    padding: 12px 25px;
    border: none;
    border-radius: 8px;
    margin-top: 10px;
    background: white;
    cursor: pointer;
    font-size: 16px;
}

/* WRAPPER (TRUE CENTER FIX) */
.wrapper {
    display: none;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
}

/* ENVELOPE */
.envelope {
    width: clamp(140px, 40vw, 200px);
    height: clamp(100px, 30vw, 150px);
    background: #fff;
    position: relative;
    cursor: pointer;
    border-radius: 10px;
    margin: auto;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    transition: 0.6s;
}

/* FLAP */
.envelope::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    width: 0;
    height: 0;
    border-left: 100px solid transparent;
    border-right: 100px solid transparent;
    border-top: 70px solid #ff6f61;
    transform-origin: top;
    transition: 0.6s;
}

/* TAP TEXT */
.envelope::after {
    content: "👆 Tap me";
    position: absolute;
    bottom: -35px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 14px;
    color: white;
    background: rgba(0,0,0,0.3);
    padding: 5px 10px;
    border-radius: 20px;
    animation: pulse 1.5s infinite;
}

@keyframes pulse {
    0% { transform: translateX(-50%) scale(1); }
    50% { transform: translateX(-50%) scale(1.1); }
    100% { transform: translateX(-50%) scale(1); }
}

/* LETTER (ALWAYS CENTERED) */
.letter {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.5);
    width: 90%;
    max-width: 420px;
    padding: 20px;
    background: rgba(255,255,255,0.97);
    border-radius: 18px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.3);
    opacity: 0;
    transition: 0.6s;
    text-align: center;
}

/* PHOTO */
.photo {
    width: clamp(100px, 30vw, 160px);
    height: clamp(100px, 30vw, 160px);
    border-radius: 50%;
    object-fit: cover;
    margin-top: 15px;
}

/* TEXT */
h2 {
    font-size: clamp(18px, 5vw, 24px);
}

p {
    font-size: clamp(14px, 4vw, 16px);
}

/* OPEN STATE */
.wrapper.open .envelope {
    transform: translateY(-40px);
    opacity: 0;
}

.wrapper.open .envelope::before {
    transform: rotateX(180deg);
}

.wrapper.open .letter {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
}

.wrapper.open .envelope::after {
    display: none;
}

/* CANVAS */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    pointer-events: none;
}
</style>
</head>

<body>

<div class="password-screen" id="passwordScreen">
    <h2>Enter Your Birthday 🎂</h2>
    <input type="text" id="passwordInput" placeholder="MMDDYYYY">
    <br>
    <button onclick="checkPassword()">Open</button>
    <p id="error" style="color: yellow;"></p>
</div>

<div class="wrapper" id="wrapper">
    <div class="envelope"></div>

    <div class="letter">
        <h2>🎉 Happy Birthday Love! 🎉</h2>
        <img src="photo.jpg" class="photo">
        <p>
            Happy birthday, my love. Wishing you all the best in this world.
            Baby and I love you so much. Enjoy your day. Mwah! 💖
        </p>
    </div>
</div>

<audio id="bgMusic" loop>
    <source src="happybirthday.mp3" type="audio/mpeg">
</audio>

<canvas id="effects"></canvas>

<script>
function checkPassword() {
    const input = document.getElementById("passwordInput").value;

    if (input === "04202000") {
        document.getElementById("passwordScreen").style.display = "none";
        document.getElementById("wrapper").style.display = "block";
        document.getElementById("bgMusic").play();
    } else {
        document.getElementById("error").textContent = "Wrong birthday 😢";
    }
}

const wrapper = document.getElementById("wrapper");
const canvas = document.getElementById("effects");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

let confetti = [];
let fireworks = [];

wrapper.addEventListener("click", () => {
    wrapper.classList.add("open");
    startConfetti();
    startFireworks();
});

function startConfetti() {
    for (let i = 0; i < 150; i++) {
        confetti.push({
            x: Math.random() * canvas.width,
            y: Math.random() * -canvas.height,
            size: Math.random() * 6 + 4,
            speed: Math.random() * 3 + 2,
            color: `hsl(${Math.random()*360},100%,50%)`
        });
    }
}

function startFireworks() {
    setInterval(() => {
        fireworks.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height / 2,
            particles: Array.from({length:30}, () => ({
                angle: Math.random() * Math.PI * 2,
                life: 60
            }))
        });
    }, 800);
}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    confetti.forEach(c => {
        c.y += c.speed;
        if (c.y > canvas.height) c.y = 0;
        ctx.fillStyle = c.color;
        ctx.fillRect(c.x, c.y, c.size, c.size);
    });

    fireworks.forEach(f => {
        f.particles.forEach(p => {
            let x = f.x + Math.cos(p.angle) * (60 - p.life);
            let y = f.y + Math.sin(p.angle) * (60 - p.life);
            ctx.fillStyle = "white";
            ctx.fillRect(x, y, 2, 2);
            p.life--;
        });
    });

    fireworks = fireworks.filter(f => f.particles.some(p => p.life > 0));

    requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
